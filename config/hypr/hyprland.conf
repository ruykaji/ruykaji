##################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$nested_terminal = ~/.config/hypr/scripts/kitty.sh
$browser = brave
$file_manager = kitty --hold yazi
$rofi_launcher = ~/.config/hypr/scripts/launcher.sh
$rofi_wallpaper = ~/.config/hypr/scripts/wallpaper.sh


#################
### AUTOSTART ###
#################

exec-once = ~/.config/hypr/scripts/monitors.sh $terminal $browser
exec-once = hyprpaper
exec-once = sh -c 'sleep 0.5; waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css'

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(89b482ee)
    col.inactive_border = rgba(282828aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = easeInOutSine, 0.37, 0, 0.63, 1

    # Windows
    animation = windowsIn, 1, 2.5, easeInOutSine, popin 60% # window open
    animation = windowsOut, 1, 2.5, easeOutCubic, popin 60% # window close.
    animation = windowsMove, 1, 2.5, easeInOutSine, slide # everything in between, moving, dragging, resizing.

    # Fading
    animation = fade, 1, 2.5, fluent_decel
    animation = fadeLayersIn, 0
    animation = border, 0

    # Layers
    animation = layers, 1, 2.5, easeInOutSine, popin

    # Workspaces
    animation = workspaces, 1, 4, fluent_decel, slidefadevert 50% # styles: slide, slidevert, fade, slidefade, slidefadevert
    animation = specialWorkspace, 1, 2, fluent_decel, slidefade 10%
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
#    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant = 
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

bind = SUPER, C, killactive, 
bind = SUPER, F, exec, $file_manager
bind = SUPER, A, exec, $rofi_launcher
bind = SUPER, W, exec, $rofi_wallpaper
#bind = SUPER, V, togglefloating,
bind = SUPER, K, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Spawn terminals
bind = SUPER, Q, submap, spawn_terminal
submap = spawn_terminal
bindl = , right, exec, hyprctl dispatch layoutmsg preselect r && $nested_terminal
bindl = , left, exec, hyprctl dispatch layoutmsg preselect l && $nested_terminal
bindl = , up, exec, hyprctl dispatch layoutmsg preselect u && $nested_terminal
bindl = , down, exec, hyprctl dispatch layoutmsg preselect d && $nested_terminal
bind = SUPER, Q, submap, reset
submap = reset

# Resize windows
bind = ALT, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = ALT, R, submap, reset
submap = reset

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Swap windows in a direction
bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, swapwindow, u
bind = SUPER SHIFT, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize

    border_size = 1
    rounding = 0
    no_blur = on
}

windowrule {
    name = active_terminal
    match:class = $terminal
    match:focus = true
    opacity = 1.0
}

windowrule {
    name = inactive_terminal
    match:class = $terminal
    match:focus = false
    opacity = 0.95
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
