allow_remote_control yes
listen_on unix:/tmp/kitty

background #1e1e1e
background_opacity 0.90
background_blur 0

window_padding_width 10

hide_window_decorations yes

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
